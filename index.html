<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa de Salas — Agi</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <img src="assets/logo.svg" alt="Agibank" class="logo">
      <div style="margin-top: 12px;">
        <h1>Onde fica?</h1>
        <span>Salas de reunião</span>
      </div>
    </div>
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="searchInput" type="text" placeholder="Buscar sala...">
    </div>
    <div class="room-list" id="roomList"></div>
  </aside>

  <main class="mapwrap">
    <div class="topbar">
      <div class="floor-toggle">
        <button data-floor="terreo" class="active">Térreo</button>
        <button data-floor="andar1">1º Andar</button>
      </div>
      <div class="tools">
        <button class="tool-btn" id="editToggle" style="display: block;">Modo calibração</button>
      </div>
    </div>

    <div class="stage" id="stage">
      <div class="plan" id="plan"></div>
      <div class="hint"><span class="tap-icon"></span>Toque para explorar o mapa</div>

      <div class="idle-overlay" id="idleOverlay">
        <div class="idle-beacon"><div class="ring"></div><div class="ring d2"></div><div class="core"></div></div>
        <h2>Toque em qualquer ponto do mapa</h2>
        <p>Encontre rapidamente sua sala de reunião.<br>O mapa e a lista ao lado são interativos.</p>
      </div>

      <div class="calib-panel" id="calibPanel">
        <h3>Modo calibração</h3>
        <p>Arraste para mover. Use as barras abaixo para ajustar o tamanho da sala selecionada.</p>
        
        <div id="sizeControls" style="display:none; margin: 10px 0; background: var(--bg); padding: 10px; border-radius: 8px;">
          <div style="margin-bottom: 8px;">
            <label style="font-size: 11px; color: var(--text);">Largura (W):</label>
            <input type="range" id="wSlider" min="1" max="30" step="0.1" style="width: 100%;">
          </div>
          <div>
            <label style="font-size: 11px; color: var(--text);">Altura (H):</label>
            <input type="range" id="hSlider" min="1" max="30" step="0.1" style="width: 100%;">
          </div>
        </div>

        <textarea id="coordOutput" readonly></textarea>
        <button id="copyCoords">Copiar coordenadas</button>
      </div>
    </div>
  </main>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
